<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物展示 — rễ , thân , lá studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--cream2:#EDE6D6;--dark:#0D0D0A;--dark2:#1A1A14;--green:#2D4A2D;--green2:#3D6B3D;--gold:#B8922A;--text:#1A1A14;--text2:#6B6B55;--text3:#9B9B85;--border:#D8D0C0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(245,240,232,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.nav-top{padding:12px 20px;display:flex;justify-content:center;align-items:center}
.nav-logo{font-size:13px;letter-spacing:.15em;color:var(--green);font-style:italic;text-decoration:none}
.nav-logo:hover{color:var(--green2)}
.nav-links{display:flex;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.nav-links::-webkit-scrollbar{display:none}
.nav-link{flex:1;min-width:fit-content;padding:7px 12px;text-align:center;font-size:10px;letter-spacing:.1em;color:var(--text3);text-decoration:none;border-right:1px solid var(--border);transition:all .15s;white-space:nowrap}
.nav-link:last-child{border-right:none}
.nav-link:hover{background:var(--cream2);color:var(--green)}
.nav-link.active{color:var(--green);background:rgba(45,74,45,.06)}

main{padding-top:82px}

.page-header{padding:32px 20px 0;text-align:center}
.page-title{font-size:28px;font-weight:300;font-style:italic;color:var(--text);margin-bottom:4px}
.page-title-vn{font-size:12px;letter-spacing:.18em;color:var(--text3);margin-bottom:24px}

.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--cream);position:sticky;top:56px;z-index:50}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:14px 8px;font-size:12px;letter-spacing:.1em;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .2s}
.tab.active{color:var(--green);border-bottom-color:var(--green)}

.tab-content{display:none;padding:20px 16px}
.tab-content.active{display:block}

.plant-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:600px){.plant-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.plant-grid{grid-template-columns:repeat(4,1fr)}}

.plant-card{background:#fff;border:1px solid var(--border);text-decoration:none;color:var(--text);display:flex;flex-direction:column;transition:box-shadow .2s,border-color .2s;cursor:pointer}
.plant-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);border-color:#C4BAA8}
.plant-card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--cream2);display:block}
.plant-card-no-img{width:100%;aspect-ratio:1;background:var(--cream2);display:flex;align-items:center;justify-content:center;color:var(--text3);font-style:italic;font-size:12px}
.plant-card-body{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.plant-card-name{font-size:15px;font-style:italic;color:var(--text);line-height:1.3}
.plant-card-rid{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.06em}
.plant-card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px}
.badge{display:inline-block;padding:2px 8px;font-size:9px;letter-spacing:.1em;border:1px solid}
.badge.available,.badge.sale{border-color:var(--green);color:var(--green);background:rgba(45,74,45,.07)}
.badge.tracking,.badge.display{border-color:var(--gold);color:var(--gold);background:rgba(184,146,42,.07)}
.badge.pup_sale{border-color:#4A7FB5;color:#4A7FB5;background:rgba(74,127,181,.07)}
.badge.sold{border-color:var(--text3);color:var(--text3);background:transparent}
.plant-card-price{font-size:15px;font-style:italic;color:var(--green);margin-top:2px}
.plant-card-loc{font-size:11px;color:var(--text3);letter-spacing:.04em}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3);font-style:italic}

.loading-state{text-align:center;padding:60px 20px}
.loading-dots{display:inline-flex;gap:6px}
.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:blink 1.2s ease-in-out infinite}
.loading-dots span:nth-child(2){animation-delay:.2s}
.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}

/* 我的植物 */
.my-plants-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 16px;flex-wrap:wrap;gap:8px}
.my-plants-btn{background:var(--green);color:var(--cream);border:none;padding:9px 18px;font-size:12px;letter-spacing:.1em;cursor:pointer;font-family:inherit;transition:background .2s}
.my-plants-btn:hover{background:#3D6B3D}
.my-plants-logout{background:none;border:1px solid var(--border);padding:7px 14px;font-size:11px;letter-spacing:.08em;color:var(--text3);cursor:pointer;font-family:inherit}
.my-plants-logout:hover{border-color:var(--text2);color:var(--text2)}
.my-plants-section{margin-bottom:28px}
.my-plants-heading{font-size:18px;font-style:italic;color:var(--green);margin-bottom:4px}
.my-plants-sub{font-size:11px;letter-spacing:.1em;color:var(--text3);margin-bottom:14px}

/* modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(26,26,20,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--cream);border:1px solid var(--border);padding:32px 28px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:20px;font-style:italic;color:var(--green)}
.modal-sub{font-size:11px;letter-spacing:.1em;color:var(--text3);margin-top:-8px}
.modal-input-row{display:flex;border:1px solid var(--border)}
.modal-input{flex:1;border:none;background:transparent;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none}
.modal-submit{background:var(--green);color:var(--cream);border:none;padding:11px 18px;font-size:11px;letter-spacing:.1em;cursor:pointer;font-family:inherit}
.modal-submit:hover{background:#3D6B3D}
.modal-error{font-size:11px;color:#8B1A1A;font-style:italic;min-height:16px}
.modal-cancel{background:none;border:none;font-size:11px;letter-spacing:.08em;color:var(--text3);cursor:pointer;font-family:inherit;align-self:flex-start;padding:0}
.modal-cancel:hover{color:var(--text2)}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a class="nav-logo" href="/index.html">rễ , thân , lá studio</a>
  </div>
  <div class="nav-links">
    <a class="nav-link" href="/index.html">首頁</a>
    <a class="nav-link active" href="/plants.html">植物展示</a>
    <a class="nav-link" href="/shop.html">其他商品</a>
    <a class="nav-link" href="/collection.html">我的收藏</a>
    <a class="nav-link" href="/admin.html">後台</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="page-title">植物展示</div>
    <div class="page-title-vn">VƯỜN CÂY</div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="for-sale">展示販售中</button>
    <button class="tab" data-tab="sold">已售出</button>
  </div>

  <div class="tab-content active" id="tab-for-sale">
    <div class="loading-state" id="loading-indicator">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="plant-grid" id="grid-for-sale" style="display:none"></div>
    <div class="empty-state" id="empty-for-sale" style="display:none">目前沒有展示中的植物 / Chưa có cây nào</div>
  </div>

  <div class="tab-content" id="tab-sold">
    <!-- 我的植物 bar -->
    <div class="my-plants-bar">
      <button class="my-plants-btn" id="my-plants-btn" onclick="openMyPlantsModal()">🔑 我的植物 / Cây của tôi</button>
      <button class="my-plants-logout" id="my-plants-logout" style="display:none" onclick="logoutCustomer()">登出 / Đăng xuất</button>
    </div>

    <!-- 我的植物區塊 (登入後顯示) -->
    <div class="my-plants-section" id="my-plants-section" style="display:none">
      <div class="my-plants-heading" id="my-plants-heading">我的植物</div>
      <div class="my-plants-sub">CÂY CỦA TÔI</div>
      <div class="plant-grid" id="grid-my-plants"></div>
      <div class="empty-state" id="empty-my-plants" style="display:none">尚未分配植物</div>
    </div>

    <div class="plant-grid" id="grid-sold"></div>
    <div class="empty-state" id="empty-sold" style="display:none">尚無已售出紀錄</div>
  </div>
</main>

<!-- 我的植物 modal -->
<div class="modal-backdrop" id="my-plants-modal" style="display:none" onclick="handleModalBackdropClick(event)">
  <div class="modal-box">
    <div class="modal-title">我的植物</div>
    <div class="modal-sub">CÂY CỦA TÔI · 輸入您的密碼</div>
    <div class="modal-input-row">
      <input class="modal-input" id="modal-pwd-input" type="text" placeholder="輸入密碼 / Nhập mật khẩu" autocomplete="off">
      <button class="modal-submit" onclick="submitMyPlants()">進入</button>
    </div>
    <div class="modal-error" id="modal-error"></div>
    <button class="modal-cancel" onclick="closeMyPlantsModal()">取消 / Huỷ</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://edvklxnzhuhmijdwyzrl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdmtseG56aHVobWlqZHd5enJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTE4MTQsImV4cCI6MjA5MzI2NzgxNH0.65Vf-XUlPZmhc-LWqzXq55bpR6RcG8iqNybf_bqyd60';

const LOC_LABEL = { mine: 'Chandler家', quang: 'Quang家', helper: '小幫手家' };
const STATUS_LABEL = { available: '可販售', tracking: '展示中', pup_sale: '側芽販售', sold: '已售出', display: '展示中', sale: '可購買' };
const PUBLIC_STATUSES = ['available', 'tracking', 'pup_sale', 'sold'];
const FOR_SALE_STATUSES = ['available', 'tracking', 'pup_sale'];
const WEB_STATUS_LABEL = { available: '可販售', tracking: '展示中', pup_sale: '側芽販售', sold: '已售出', display: '展示中', sale: '可購買' };

async function dbGet(table, q) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + q, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
  });
  return r.json();
}

let allPlants = []; // enriched plant records

function getCardUrl(rid) {
  return '/plant.html?rid=' + rid;
}

function renderCard(p) {
  const imgHtml = p.photo_url
    ? `<img class="plant-card-img" src="${p.photo_url}" alt="${p.plant_name||''}" loading="lazy">`
    : `<div class="plant-card-no-img"><span>尚無照片</span></div>`;

  const ws = p.web_status || p.status;
  const showPrice = (ws === 'available' || ws === 'pup_sale') && p.price;
  const priceHtml = showPrice ? `<div class="plant-card-price">NT$ ${Number(p.price).toLocaleString()}</div>` : '';
  const ownerText = p.web_owner ? (LOC_LABEL[p.web_owner] || p.web_owner) : '';

  return `
    <a class="plant-card" href="${getCardUrl(p.rid)}">
      ${imgHtml}
      <div class="plant-card-body">
        <div class="plant-card-name">${p.plant_name || p.rid}</div>
        <div class="plant-card-rid">${p.rid}</div>
        <div class="plant-card-badges">
          <span class="badge ${ws}">${WEB_STATUS_LABEL[ws] || ws}</span>
        </div>
        ${priceHtml}
        ${ownerText ? `<div class="plant-card-loc">📍 ${ownerText}</div>` : ''}
      </div>
    </a>`;
}

function renderGrid(plants, gridId, emptyId) {
  const grid = document.getElementById(gridId);
  const empty = document.getElementById(emptyId);
  if (!plants.length) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.innerHTML = plants.map(renderCard).join('');
  grid.style.display = 'grid';
  empty.style.display = 'none';
}

async function init() {
  // 1. 從 rehab 取得所有公開植物（display / sale / sold）
  const rehabRows = await dbGet('rehab', '?status=in.(display,sale,sold)&select=rid,plant_id,plant_name,purchase_date,status&order=rid.asc');
  if (!Array.isArray(rehabRows) || !rehabRows.length) {
    document.getElementById('loading-indicator').style.display = 'none';
    document.getElementById('empty-for-sale').style.display = 'block';
    return;
  }
  const rehabMap = {};
  rehabRows.forEach(r => { rehabMap[r.rid] = r; });
  const visibleRids = rehabRows.map(r => r.rid);

  // 2. 從 plants 取得品種價格
  const plantsRows = await dbGet('plants', '?select=id,name,price');
  const plantsMap = {};
  if (Array.isArray(plantsRows)) plantsRows.forEach(p => { plantsMap[p.id] = p; });

  // 3. 取得精選照片
  let photosMap = {};
  if (visibleRids.length) {
    const photoRows = await dbGet('photos', `?rid=in.(${visibleRids.join(',')})&approved=eq.true&order=taken_at.asc&select=rid,photo_url,is_featured,taken_at`);
    if (Array.isArray(photoRows)) {
      photoRows.forEach(ph => {
        if (!photosMap[ph.rid]) {
          photosMap[ph.rid] = ph;
        } else {
          if (ph.is_featured && !photosMap[ph.rid].is_featured) {
            photosMap[ph.rid] = ph;
          } else if (!photosMap[ph.rid].is_featured && !ph.is_featured) {
            photosMap[ph.rid] = ph;
          }
        }
      });
    }
  }

  // 4. 組合資料
  allPlants = rehabRows.map(r => {
    const plant = r.plant_id ? plantsMap[r.plant_id] : null;
    return {
      rid: r.rid,
      web_status: r.status,
      plant_name: (plant && plant.name) || r.plant_name || r.rid,
      price: plant ? plant.price : null,
      photo_url: photosMap[r.rid] ? photosMap[r.rid].photo_url : null,
    };
  });

  // 5. 渲染分頁
  const forSale = allPlants.filter(p => ['display','sale'].includes(p.web_status));
  const sold = allPlants.filter(p => p.web_status === 'sold');

  document.getElementById('loading-indicator').style.display = 'none';
  renderGrid(forSale, 'grid-for-sale', 'empty-for-sale');
  renderGrid(sold, 'grid-sold', 'empty-sold');
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  };
});

// ══════════════════════════════════════════════════════════
// 我的植物 / Customer login
// ══════════════════════════════════════════════════════════
let currentCustomer = null;

function openMyPlantsModal() {
  document.getElementById('my-plants-modal').style.display = 'flex';
  document.getElementById('modal-pwd-input').value = '';
  document.getElementById('modal-error').textContent = '';
  setTimeout(() => document.getElementById('modal-pwd-input').focus(), 50);
}
function closeMyPlantsModal() {
  document.getElementById('my-plants-modal').style.display = 'none';
}
function handleModalBackdropClick(e) {
  if (e.target === document.getElementById('my-plants-modal')) closeMyPlantsModal();
}
document.getElementById('modal-pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitMyPlants();
});

async function submitMyPlants() {
  const pwd = document.getElementById('modal-pwd-input').value.trim();
  if (!pwd) return;
  document.getElementById('modal-error').textContent = '';

  const rows = await dbGet('customers', `?password=eq.${encodeURIComponent(pwd)}&limit=1`);
  if (!Array.isArray(rows) || !rows.length) {
    document.getElementById('modal-error').textContent = '密碼錯誤 / Sai mật khẩu';
    return;
  }
  const cust = rows[0];
  sessionStorage.setItem('customer_session', JSON.stringify({ id: cust.id, name: cust.name, password: cust.password }));
  closeMyPlantsModal();
  await loginCustomer(cust);
}

async function loginCustomer(cust) {
  currentCustomer = cust;
  document.getElementById('my-plants-btn').style.display = 'none';
  document.getElementById('my-plants-logout').style.display = 'inline-block';
  document.getElementById('my-plants-section').style.display = 'block';
  document.getElementById('my-plants-heading').textContent = `${cust.name} 的植物`;

  // Switch to sold tab if not already
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('.tab[data-tab="sold"]').classList.add('active');
  document.getElementById('tab-sold').classList.add('active');

  // Fetch their plant_web records
  const webRows = await dbGet('plant_web', `?customer_id=eq.${cust.id}&select=rid,web_status,web_owner`);
  if (!Array.isArray(webRows) || !webRows.length) {
    document.getElementById('grid-my-plants').innerHTML = '';
    document.getElementById('empty-my-plants').style.display = 'block';
    return;
  }

  const rids = webRows.map(w => w.rid);
  const webMap = {};
  webRows.forEach(w => { webMap[w.rid] = w; });

  // Fetch rehab + plants + photos for these rids
  const [rehabRows, plantsRows, photoRows] = await Promise.all([
    dbGet('rehab', `?rid=in.(${rids.join(',')})&select=rid,plant_id,plant_name`),
    dbGet('plants', '?select=id,name,price'),
    dbGet('photos', `?rid=in.(${rids.join(',')})&approved=eq.true&order=taken_at.asc&select=rid,photo_url,is_featured`),
  ]);

  const rehabMap = {};
  if (Array.isArray(rehabRows)) rehabRows.forEach(r => { rehabMap[r.rid] = r; });
  const plantsMap = {};
  if (Array.isArray(plantsRows)) plantsRows.forEach(p => { plantsMap[p.id] = p; });
  const photosMap = {};
  if (Array.isArray(photoRows)) {
    photoRows.forEach(ph => {
      if (!photosMap[ph.rid]) photosMap[ph.rid] = ph;
      else if (ph.is_featured && !photosMap[ph.rid].is_featured) photosMap[ph.rid] = ph;
      else if (!photosMap[ph.rid].is_featured && !ph.is_featured) photosMap[ph.rid] = ph;
    });
  }

  const myPlants = rids.map(rid => {
    const w = webMap[rid];
    const r = rehabMap[rid] || {};
    const plant = r.plant_id ? plantsMap[r.plant_id] : null;
    return {
      rid,
      web_status: w.web_status,
      web_owner: w.web_owner,
      plant_name: (plant && plant.name) || r.plant_name || rid,
      price: plant ? plant.price : null,
      photo_url: photosMap[rid] ? photosMap[rid].photo_url : null,
    };
  });

  const grid = document.getElementById('grid-my-plants');
  const empty = document.getElementById('empty-my-plants');
  if (!myPlants.length) {
    grid.innerHTML = '';
    grid.style.display = 'none';
    empty.style.display = 'block';
  } else {
    grid.innerHTML = myPlants.map(p => renderMyPlantCard(p, cust.password)).join('');
    grid.style.display = 'grid';
    empty.style.display = 'none';
  }
}

function renderMyPlantCard(p, password) {
  const imgHtml = p.photo_url
    ? `<img class="plant-card-img" src="${p.photo_url}" alt="${p.plant_name||''}" loading="lazy">`
    : `<div class="plant-card-no-img"><span>尚無照片</span></div>`;
  const ws = p.web_status || 'sold';
  const ownerText = p.web_owner ? (LOC_LABEL[p.web_owner] || p.web_owner) : '';
  const viewUrl = `/plant.html?rid=${p.rid}&key=${encodeURIComponent(password)}`;

  return `
    <a class="plant-card" href="${viewUrl}">
      ${imgHtml}
      <div class="plant-card-body">
        <div class="plant-card-name">${p.plant_name || p.rid}</div>
        <div class="plant-card-rid">${p.rid}</div>
        <div class="plant-card-badges">
          <span class="badge ${ws}">${WEB_STATUS_LABEL[ws] || ws}</span>
        </div>
        ${ownerText ? `<div class="plant-card-loc">📍 ${ownerText}</div>` : ''}
        <div style="margin-top:4px;font-size:11px;color:var(--green);letter-spacing:.06em">查看 →</div>
      </div>
    </a>`;
}

function logoutCustomer() {
  sessionStorage.removeItem('customer_session');
  currentCustomer = null;
  document.getElementById('my-plants-btn').style.display = 'inline-block';
  document.getElementById('my-plants-logout').style.display = 'none';
  document.getElementById('my-plants-section').style.display = 'none';
  document.getElementById('grid-my-plants').innerHTML = '';
}

// Auto-login from ?key=PASSWORD in URL
async function checkUrlKey() {
  const params = new URLSearchParams(window.location.search);
  const key = params.get('key');
  if (key) {
    // Try session first
    const stored = sessionStorage.getItem('customer_session');
    if (stored) {
      try {
        const s = JSON.parse(stored);
        if (s.password === key) { await loginCustomer(s); return; }
      } catch(e) {}
    }
    // Look up by password
    const rows = await dbGet('customers', `?password=eq.${encodeURIComponent(key)}&limit=1`);
    if (Array.isArray(rows) && rows.length) {
      const cust = rows[0];
      sessionStorage.setItem('customer_session', JSON.stringify({ id: cust.id, name: cust.name, password: cust.password }));
      await loginCustomer(cust);
    }
  } else {
    // Restore from sessionStorage if present
    const stored = sessionStorage.getItem('customer_session');
    if (stored) {
      try { await loginCustomer(JSON.parse(stored)); } catch(e) {}
    }
  }
}

async function initAll() {
  await init();
  await checkUrlKey();
}

initAll();
</script>
