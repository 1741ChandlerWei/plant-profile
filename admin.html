<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後台管理 — rễ , thân , lá studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--cream:#F5F0E8;--cream2:#EDE6D6;--dark2:#1A1A14;--green:#2D4A2D;--green2:#3D6B3D;--gold:#B8922A;--text:#1A1A14;--text2:#6B6B55;--text3:#9B9B85;--border:#D8D0C0;--red:#8B1A1A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--text);font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh}

nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(245,240,232,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;flex-direction:column}
.nav-top{padding:10px 20px;display:flex;align-items:center;gap:12px}
.nav-back{color:var(--green);text-decoration:none;font-size:12px;letter-spacing:.1em;flex-shrink:0}
.nav-logo{flex:1;text-align:center;font-size:13px;letter-spacing:.15em;color:var(--text3);font-style:italic}
.nav-spacer{width:60px;flex-shrink:0}
.nav-strip{display:flex;gap:0;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 20px;background:var(--cream2)}
.nav-strip::-webkit-scrollbar{display:none}
.nav-strip a{display:inline-block;padding:7px 12px;font-size:10px;letter-spacing:.08em;color:var(--text3);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s}
.nav-strip a:hover{color:var(--green)}
.nav-strip a.current{color:var(--green);border-bottom-color:var(--green)}
.nav-strip .nav-ext::after{content:'↗';margin-left:3px;font-size:9px;opacity:.6}

/* 密碼屏 */
.auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:24px}
.auth-logo{font-size:26px;font-style:italic;color:var(--green);letter-spacing:.1em;margin-bottom:8px}
.auth-sub{font-size:12px;color:var(--text3);letter-spacing:.12em}
.pwd-row{display:flex;gap:0;border:1px solid var(--border);width:100%;max-width:280px}
.pwd-input{flex:1;border:none;background:transparent;padding:12px 14px;font-size:14px;font-family:inherit;color:var(--text);outline:none}
.pwd-btn{background:var(--green);color:var(--cream);border:none;padding:12px 18px;font-size:11px;letter-spacing:.1em;cursor:pointer;font-family:inherit}
.pwd-btn:hover{background:var(--green2)}
.pwd-error{font-size:11px;color:var(--red);font-style:italic;height:16px}

/* 主面板 */
.main-panel{display:none;padding-top:82px}

/* 主分頁 */
.main-tabs{display:flex;border-bottom:2px solid var(--border);background:var(--cream2)}
.main-tab{flex:1;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;padding:14px 8px;font-size:13px;letter-spacing:.1em;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .2s}
.main-tab.active{color:var(--green);border-bottom-color:var(--green);background:var(--cream)}
.main-tab:hover:not(.active){color:var(--text2)}
.main-tab-content{display:none}
.main-tab-content.active{display:block}

.page-header{padding:28px 20px 0;border-bottom:1px solid var(--border);padding-bottom:20px}
.page-title{font-size:24px;font-weight:300;font-style:italic;margin-bottom:4px}
.page-title-sub{font-size:11px;letter-spacing:.14em;color:var(--text3)}

/* 篩選列 */
.filter-row{display:flex;gap:8px;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;letter-spacing:.1em;color:var(--text3);flex-shrink:0}
.filter-btn{background:none;border:1px solid var(--border);padding:5px 14px;font-size:11px;letter-spacing:.08em;color:var(--text3);cursor:pointer;font-family:inherit;transition:all .2s}
.filter-btn.active{background:var(--green);color:var(--cream);border-color:var(--green)}
.filter-btn:hover:not(.active){border-color:var(--text2);color:var(--text2)}

/* 植物列表 */
.plant-list{padding:16px 20px;display:flex;flex-direction:column;gap:10px}

.plant-row{display:grid;grid-template-columns:56px 1fr;grid-template-rows:auto auto;column-gap:12px;row-gap:8px;padding:12px 14px;border:1px solid var(--border);background:#fff;transition:border-color .2s}
.plant-row:hover{border-color:#C4BAA8}
.plant-thumb{width:52px;height:52px;object-fit:cover;grid-row:1/3;background:var(--cream2)}
.plant-thumb-empty{width:52px;height:52px;background:var(--cream2);grid-row:1/3;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text3)}
.plant-info{min-width:0;align-self:end}
.plant-name{font-size:15px;font-style:italic;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plant-rid{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.06em}
.plant-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.status-select{border:1px solid var(--border);background:var(--cream);padding:6px 10px;font-size:12px;font-family:inherit;color:var(--text);appearance:none;-webkit-appearance:none;outline:none;cursor:pointer;min-width:100px}
.status-select:focus{border-color:var(--green)}
.owner-select{border:1px solid var(--border);background:var(--cream);padding:6px 10px;font-size:12px;font-family:inherit;color:var(--text);appearance:none;-webkit-appearance:none;outline:none;cursor:pointer;min-width:88px}
.save-row-btn{background:var(--green);color:var(--cream);border:none;padding:6px 14px;font-size:11px;letter-spacing:.1em;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s}
.save-row-btn:hover{background:var(--green2)}
.save-row-btn:disabled{opacity:.5;cursor:not-allowed}
.view-link{font-size:11px;color:var(--text3);text-decoration:none;letter-spacing:.06em;white-space:nowrap}
.view-link:hover{color:var(--green)}

/* status 色標 */
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-private{background:#C4BAA8}
.dot-available{background:var(--green)}
.dot-tracking{background:var(--gold)}
.dot-pup_sale{background:#4A7FB5}
.dot-sold{background:var(--text3)}

/* loading */
.loading-state{text-align:center;padding:60px 20px;color:var(--text3);font-style:italic}

/* toast */
.save-toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:var(--cream);padding:8px 16px;font-size:11px;letter-spacing:.1em;z-index:800;opacity:0;transition:opacity .3s;pointer-events:none}
.save-toast.show{opacity:1}

/* 統計列 */
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--cream2)}
.stat-item{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border)}
.stat-item:last-child{border-right:none}
.stat-num{font-size:22px;font-style:italic;color:var(--text)}
.stat-lbl{font-size:9.5px;letter-spacing:.1em;color:var(--text3)}

/* ── 客戶管理 ── */
.cust-layout{display:flex;flex-direction:column;gap:0}
.cust-section{padding:20px;border-bottom:1px solid var(--border)}
.cust-section-title{font-size:13px;letter-spacing:.12em;color:var(--text3);margin-bottom:14px;font-style:italic}
.cust-table{width:100%;border-collapse:collapse;font-size:13px}
.cust-table th{text-align:left;font-size:10px;letter-spacing:.12em;color:var(--text3);font-weight:400;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--cream2)}
.cust-table td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.cust-table tr:hover td{background:rgba(237,230,214,.4)}
.cust-table tr.selected td{background:rgba(45,74,45,.06);border-left:3px solid var(--green)}
.cust-pwd-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);word-break:break-all;cursor:pointer;text-decoration:underline dotted}
.cust-pwd-url:hover{color:var(--green2)}
.cust-action-btn{background:none;border:1px solid var(--border);padding:4px 10px;font-size:10px;letter-spacing:.08em;cursor:pointer;font-family:inherit;color:var(--text2);transition:all .2s}
.cust-action-btn:hover{border-color:var(--green);color:var(--green)}
.cust-action-btn.danger{color:var(--red);border-color:var(--red)}
.cust-action-btn.danger:hover{background:var(--red);color:var(--cream)}
.cust-form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.cust-form{grid-template-columns:1fr}}
.cust-form-row{display:flex;flex-direction:column;gap:4px}
.cust-form-row.full{grid-column:1/-1}
.cust-form label{font-size:10px;letter-spacing:.1em;color:var(--text3)}
.cust-form input,.cust-form textarea{border:1px solid var(--border);background:var(--cream);padding:8px 10px;font-size:13px;font-family:inherit;color:var(--text);outline:none;width:100%;resize:vertical}
.cust-form input:focus,.cust-form textarea:focus{border-color:var(--green)}
.cust-form-actions{grid-column:1/-1;display:flex;gap:8px;align-items:center}
.cust-save-btn{background:var(--green);color:var(--cream);border:none;padding:8px 20px;font-size:11px;letter-spacing:.1em;cursor:pointer;font-family:inherit;transition:background .2s}
.cust-save-btn:hover{background:var(--green2)}
.cust-cancel-btn{background:none;border:1px solid var(--border);padding:8px 14px;font-size:11px;letter-spacing:.08em;cursor:pointer;font-family:inherit;color:var(--text2)}
.cust-badge{display:inline-block;padding:2px 7px;font-size:10px;letter-spacing:.06em;border:1px solid var(--border);color:var(--text3)}
.assign-panel{padding:20px;border-bottom:1px solid var(--border);background:rgba(45,74,45,.03)}
.assign-panel-title{font-size:12px;letter-spacing:.1em;color:var(--green);margin-bottom:12px;font-style:italic}
.assign-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;max-height:220px;overflow-y:auto}
.assign-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);background:#fff;font-size:12px}
.assign-item-rid{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold)}
.assign-item-name{flex:1;font-style:italic}
.assign-remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 4px}
.assign-remove-btn:hover{color:var(--red)}
.assign-add-row{display:flex;gap:8px}
.assign-select{flex:1;border:1px solid var(--border);background:var(--cream);padding:7px 10px;font-size:12px;font-family:inherit;color:var(--text);outline:none}
.assign-add-btn{background:var(--green);color:var(--cream);border:none;padding:7px 14px;font-size:11px;letter-spacing:.08em;cursor:pointer;font-family:inherit}
.assign-add-btn:hover{background:var(--green2)}
.assign-empty{font-size:12px;color:var(--text3);font-style:italic;padding:8px 0}
</style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a class="nav-back" href="/">← 首頁</a>
    <div class="nav-logo">後台管理 · Quản Lý</div>
    <div class="nav-spacer"></div>
  </div>
  <div class="nav-strip">
    <a href="/">🌿 植物展示</a>
    <a href="/admin.html" class="current">⚙️ 後台管理</a>
    <a href="/dashboard.html">🔧 維護看板</a>
    <a href="/guide.html">📋 操作說明</a>
    <a href="/markers.html">⬛ ArUco 圖案</a>
    <a href="https://plant-pos.vercel.app/upload.html" class="nav-ext" target="_blank">📷 上傳系統</a>
  </div>
</nav>

<!-- 密碼屏 -->
<div class="auth-screen" id="auth-screen">
  <div class="auth-logo">rễ , thân , lá</div>
  <div class="auth-sub">後台管理 · Quản lý nội bộ</div>
  <div style="font-size:10px;color:var(--text3);margin-top:-8px">v1.4</div>
  <div class="pwd-row">
    <input class="pwd-input" id="pwd-input" type="password" placeholder="輸入密碼" autocomplete="current-password">
    <button class="pwd-btn" id="pwd-btn">進入</button>
  </div>
  <div class="pwd-error" id="pwd-error"></div>
</div>

<!-- 主面板 -->
<div class="main-panel" id="main-panel">

  <div class="page-header">
    <div class="page-title">後台管理</div>
    <div class="page-title-sub">QUẢN LÝ NỘI BỘ</div>
  </div>

  <!-- 主分頁切換 -->
  <div class="main-tabs">
    <button class="main-tab active" data-main-tab="plants">植物狀態</button>
    <button class="main-tab" data-main-tab="customers">客戶管理</button>
  </div>

  <!-- ── TAB 1: 植物狀態 ── -->
  <div class="main-tab-content active" id="main-tab-plants">
    <!-- 統計 -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-item"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">總植物數</div></div>
      <div class="stat-item"><div class="stat-num" id="s-public">—</div><div class="stat-lbl">展示中</div></div>
      <div class="stat-item"><div class="stat-num" id="s-private">—</div><div class="stat-lbl">隱藏</div></div>
      <div class="stat-item"><div class="stat-num" id="s-sold">—</div><div class="stat-lbl">售出/託管</div></div>
    </div>
    <!-- 篩選 -->
    <div class="filter-row">
      <span class="filter-label">篩選：</span>
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="hidden">隱藏</button>
      <button class="filter-btn" data-filter="display">展示中</button>
      <button class="filter-btn" data-filter="sale">可販售</button>
      <button class="filter-btn" data-filter="sold">售出/託管</button>
    </div>
    <div id="loading-state" class="loading-state">載入中...</div>
    <div class="plant-list" id="plant-list"></div>
  </div>

  <!-- ── TAB 2: 客戶管理 ── -->
  <div class="main-tab-content" id="main-tab-customers">

    <!-- Section A: 客戶列表 -->
    <div class="cust-section">
      <div class="cust-section-title">客戶列表 / Danh sách khách hàng</div>
      <div id="cust-loading" class="loading-state" style="padding:20px;font-size:12px">載入中...</div>
      <table class="cust-table" id="cust-table" style="display:none">
        <thead>
          <tr>
            <th>姓名</th>
            <th>密碼</th>
            <th>連結</th>
            <th>備註</th>
            <th>植物數</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="cust-tbody"></tbody>
      </table>
    </div>

    <!-- Section C: 分配植物 (顯示於選中客戶後) -->
    <div class="assign-panel" id="assign-panel" style="display:none">
      <div class="assign-panel-title" id="assign-panel-title">指定植物給客戶</div>
      <div class="assign-list" id="assign-list"></div>
      <div class="assign-add-row">
        <select class="assign-select" id="assign-select">
          <option value="">— 選擇已售出未分配的植物 —</option>
        </select>
        <button class="assign-add-btn" onclick="addAssignment()">新增</button>
      </div>
    </div>

    <!-- Section B: 新增/編輯表單 -->
    <div class="cust-section">
      <div class="cust-section-title" id="cust-form-title">新增客戶 / Thêm khách hàng</div>
      <div class="cust-form">
        <input type="hidden" id="cust-edit-id">
        <div class="cust-form-row">
          <label>姓名 / Tên</label>
          <input type="text" id="cust-name" placeholder="客戶姓名">
        </div>
        <div class="cust-form-row">
          <label>密碼 / Mật khẩu</label>
          <input type="text" id="cust-password" placeholder="自訂密碼">
        </div>
        <div class="cust-form-row full">
          <label>備註 / Ghi chú</label>
          <textarea id="cust-notes" rows="3" placeholder="備註..."></textarea>
        </div>
        <div class="cust-form-actions">
          <button class="cust-save-btn" onclick="saveCustomer()">儲存客戶</button>
          <button class="cust-cancel-btn" id="cust-cancel-btn" onclick="cancelEditCustomer()" style="display:none">取消</button>
        </div>
      </div>
    </div>

  </div><!-- /main-tab-customers -->

</div>

<div class="save-toast" id="save-toast"></div>

<script>
const SUPABASE_URL = 'https://edvklxnzhuhmijdwyzrl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkdmtseG56aHVobWlqZHd5enJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTE4MTQsImV4cCI6MjA5MzI2NzgxNH0.65Vf-XUlPZmhc-LWqzXq55bpR6RcG8iqNybf_bqyd60';
const ADMIN_PWD = 'roots';

async function dbGet(table, q) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + table + q, {
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
  });
  return r.json();
}

function toast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 登入 ──────────────────────────────────────────────────
document.getElementById('pwd-btn').onclick = tryLogin;
document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  if (document.getElementById('pwd-input').value === ADMIN_PWD) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-panel').style.display = 'block';
    loadPlants();
  } else {
    const err = document.getElementById('pwd-error');
    err.textContent = '密碼錯誤 / Sai mật khẩu';
    setTimeout(() => err.textContent = '', 2500);
    document.getElementById('pwd-input').value = '';
    document.getElementById('pwd-input').focus();
  }
}

// ── 資料 ──────────────────────────────────────────────────
let allRows = [];
let currentFilter = 'all';

const WEB_STATUS_OPTIONS = [
  { value: 'hidden',  label: '隱藏' },
  { value: 'display', label: '展示中' },
  { value: 'sale',    label: '可販售' },
  // 售出只走 POS 開單流程，後台不開放直接標記
];
// backward compat：舊值顯示名稱
const STATUS_LABEL = { hidden:'隱藏', display:'展示中', sale:'可販售', sold:'售出', private:'隱藏', tracking:'隱藏', available:'可販售', pup_sale:'可販售', rehab:'隱藏' };
const OWNER_OPTIONS = [
  { value: '',       label: '（不顯示）' },
  { value: 'mine',   label: 'Chandler家' },
  { value: 'quang',  label: 'Quang家' },
  { value: 'helper', label: '小幫手家' },
];

async function loadPlants() {
  document.getElementById('loading-state').style.display = 'block';
  document.getElementById('plant-list').innerHTML = '';

  // 同時取得 rehab、plant_web、每株最新照片
  const [rehabRows, photoRows, plantsRows] = await Promise.all([
    dbGet('rehab', '?order=rid.asc&select=rid,plant_id,plant_name,purchase_date,status'),
    dbGet('photos', '?approved=eq.true&order=taken_at.asc&select=rid,photo_url,is_featured'),
    dbGet('plants', '?select=id,name'),
  ]);

  // 每株取精選照片，否則最後一張
  const photoMap = {};
  if (Array.isArray(photoRows)) {
    photoRows.forEach(ph => {
      if (!photoMap[ph.rid]) photoMap[ph.rid] = ph;
      else if (ph.is_featured && !photoMap[ph.rid].is_featured) photoMap[ph.rid] = ph;
      else if (!photoMap[ph.rid].is_featured && !ph.is_featured) photoMap[ph.rid] = ph;
    });
  }

  const plantsMap = {};
  if (Array.isArray(plantsRows)) plantsRows.forEach(p => { plantsMap[p.id] = p; });

  allRows = Array.isArray(rehabRows) ? rehabRows.map(r => {
    const pl = r.plant_id ? plantsMap[r.plant_id] : null;
    return {
      rid: r.rid,
      plant_name: (pl && pl.name) || r.plant_name || r.rid,
      web_status: r.status || 'private',
      web_owner: '',
      photo_url: photoMap[r.rid] ? photoMap[r.rid].photo_url : null,
    };
  }) : [];

  updateStats();
  document.getElementById('loading-state').style.display = 'none';
  renderList();
}

function updateStats() {
  const total = allRows.length;
  const pub = allRows.filter(r => ['display','sale','available','pup_sale'].includes(normalizeStatus(r.web_status))).length;
  const priv = allRows.filter(r => ['private','rehab'].includes(r.web_status)).length;
  const sold = allRows.filter(r => ['sold','hidden'].includes(r.web_status)).length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-public').textContent = pub;
  document.getElementById('s-private').textContent = priv;
  document.getElementById('s-sold').textContent = sold;
}

// 把舊值正規化成新值
function normalizeStatus(s) {
  if (!s) return 'hidden';
  const map = { private:'hidden', rehab:'hidden', tracking:'hidden', available:'sale', pup_sale:'sale' };
  return map[s] || s;
}

function renderList() {
  const filtered = currentFilter === 'all'
    ? allRows
    : currentFilter === 'sold'
      ? allRows.filter(r => ['sold','hidden'].includes(r.web_status))
      : allRows.filter(r => normalizeStatus(r.web_status) === currentFilter);

  const list = document.getElementById('plant-list');
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3);font-style:italic">沒有符合條件的植物</div>';
    return;
  }

  list.innerHTML = filtered.map(r => {
    const normStatus = normalizeStatus(r.web_status);
    const isCustody = r.web_status === 'hidden'; // 已託管，由 plant-pos 管理，不可在此修改
    const statusOpts = WEB_STATUS_OPTIONS.map(o =>
      `<option value="${o.value}" ${normStatus === o.value ? 'selected' : ''}>${o.label}</option>`
    ).join('');
    const ownerOpts = OWNER_OPTIONS.map(o =>
      `<option value="${o.value}" ${r.web_owner === o.value ? 'selected' : ''}>${o.label}</option>`
    ).join('');
    const thumb = r.photo_url
      ? `<img class="plant-thumb" src="${r.photo_url}" loading="lazy" alt="">`
      : `<div class="plant-thumb-empty">🌿</div>`;

    const controls = isCustody
      ? `<span style="font-size:11px;color:var(--text3);letter-spacing:.05em;padding:4px 8px;border:1px solid var(--border);border-radius:3px">🔒 已託管（由POS管理）</span>
         <a class="view-link" href="/plant.html?rid=${r.rid}" target="_blank">查看 →</a>`
      : `<select class="status-select" id="sel-status-${r.rid}" onchange="markDirty('${r.rid}')">${statusOpts}</select>
         <select class="owner-select" id="sel-owner-${r.rid}" onchange="markDirty('${r.rid}')">${ownerOpts}</select>
         <button class="save-row-btn" id="save-btn-${r.rid}" onclick="saveRow('${r.rid}')">儲存</button>
         <a class="view-link" href="/plant.html?rid=${r.rid}" target="_blank">查看 →</a>`;

    return `
    <div class="plant-row" id="row-${r.rid}">
      ${thumb}
      <div class="plant-info">
        <div class="plant-name">${r.plant_name}</div>
        <div class="plant-rid">${r.rid}</div>
      </div>
      <div class="plant-controls">
        ${controls}
      </div>
    </div>`;
  }).join('');
}

function markDirty(rid) {
  const btn = document.getElementById('save-btn-' + rid);
  if (btn) btn.style.background = 'var(--gold)';
}

async function saveRow(rid) {
  const newStatus = document.getElementById('sel-status-' + rid).value;
  const newOwner  = document.getElementById('sel-owner-' + rid).value;
  const btn = document.getElementById('save-btn-' + rid);
  btn.textContent = '儲存中...'; btn.disabled = true;

  // 寫入 rehab.status — 透過 plant-pos API（使用 service key 繞過 RLS）
  const r = await fetch('https://plant-pos.vercel.app/api/update-rehab-status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ rid, status: newStatus })
  });

  btn.textContent = '儲存'; btn.disabled = false;
  btn.style.background = '';

  if (r.ok) {
    const row = allRows.find(x => x.rid === rid);
    if (row) { row.web_status = newStatus; row.web_owner = newOwner; }
    updateStats();
    toast(rid + ' 已更新 ✓');
  } else {
    let errMsg = `HTTP ${r.status}`;
    try { const body = await r.clone().json(); errMsg = body.message || body.details || errMsg; } catch(e){}
    console.error('saveRow failed:', r.status, errMsg);
    toast('儲存失敗 ' + r.status + '：' + errMsg.slice(0, 40));
  }
}

// ── 篩選 ──────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderList();
  };
});

// ── 主分頁切換 ──────────────────────────────────────────────
document.querySelectorAll('.main-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.main-tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('main-tab-' + tab.dataset.mainTab).classList.add('active');
    if (tab.dataset.mainTab === 'customers' && !custLoaded) loadCustomers();
  };
});

// ══════════════════════════════════════════════════════════
// 客戶管理
// ══════════════════════════════════════════════════════════
let custLoaded = false;
let allCustomers = [];
let soldUnassigned = []; // sold plants with no customer_id
let selectedCustId = null;
let assignedPlants = []; // plant_web rows for selected customer

async function dbPatch(table, q, body) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table + q, {
    method: 'PATCH',
    headers: {
      apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', Prefer: 'return=minimal'
    },
    body: JSON.stringify(body)
  });
}
async function dbPost(table, body, prefer) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table, {
    method: 'POST',
    headers: {
      apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      Prefer: prefer || 'return=representation'
    },
    body: JSON.stringify(body)
  });
}
async function dbDelete(table, q) {
  return fetch(SUPABASE_URL + '/rest/v1/' + table + q, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }
  });
}

async function loadCustomers() {
  document.getElementById('cust-loading').style.display = 'block';
  document.getElementById('cust-table').style.display = 'none';

  // Fetch customers + plant_web (to count per customer)
  const [customers, plantWebRows] = await Promise.all([
    dbGet('customers', '?order=id.asc&select=id,name,password,notes'),
    dbGet('plant_web', '?web_status=eq.sold&select=rid,customer_id,web_status'),
  ]);

  allCustomers = Array.isArray(customers) ? customers : [];
  const webRows = Array.isArray(plantWebRows) ? plantWebRows : [];

  // Count plants per customer
  const countMap = {};
  soldUnassigned = [];
  webRows.forEach(w => {
    if (w.customer_id) {
      countMap[w.customer_id] = (countMap[w.customer_id] || 0) + 1;
    } else {
      soldUnassigned.push(w);
    }
  });

  custLoaded = true;
  document.getElementById('cust-loading').style.display = 'none';
  document.getElementById('cust-table').style.display = 'table';
  renderCustomerTable(countMap);
}

function renderCustomerTable(countMap) {
  const tbody = document.getElementById('cust-tbody');
  if (!allCustomers.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3);font-style:italic">尚無客戶資料</td></tr>';
    return;
  }
  tbody.innerHTML = allCustomers.map(c => {
    const url = `plant-profile.vercel.app/plants.html?key=${encodeURIComponent(c.password || '')}`;
    const count = countMap[c.id] || 0;
    const isSelected = selectedCustId === c.id;
    return `<tr class="${isSelected ? 'selected' : ''}" id="cust-row-${c.id}">
      <td style="font-style:italic">${escHtml(c.name || '')}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px">${escHtml(c.password || '')}</td>
      <td><span class="cust-pwd-url" title="點擊複製" onclick="copyUrl('${url}')">${url}</span></td>
      <td style="font-size:12px;color:var(--text2)">${escHtml(c.notes || '')}</td>
      <td style="text-align:center"><span class="cust-badge">${count}</span></td>
      <td style="white-space:nowrap">
        <button class="cust-action-btn" onclick="selectCustomer(${c.id})" title="查看分配植物">🌿 指定</button>
        <button class="cust-action-btn" onclick="editCustomer(${c.id})" style="margin-left:4px">編輯</button>
        <button class="cust-action-btn danger" onclick="deleteCustomer(${c.id})" style="margin-left:4px">刪除</button>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('連結已複製 ✓')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('連結已複製 ✓');
  });
}

async function selectCustomer(custId) {
  selectedCustId = custId;
  const cust = allCustomers.find(c => c.id === custId);
  if (!cust) return;

  // Highlight row
  document.querySelectorAll('#cust-tbody tr').forEach(tr => tr.classList.remove('selected'));
  const row = document.getElementById('cust-row-' + custId);
  if (row) row.classList.add('selected');

  // Show assign panel
  const panel = document.getElementById('assign-panel');
  panel.style.display = 'block';
  document.getElementById('assign-panel-title').textContent = `「${cust.name}」的植物 / Cây của ${cust.name}`;

  // Fetch this customer's assigned plants
  const webRows = await dbGet('plant_web', `?customer_id=eq.${custId}&web_status=eq.sold&select=rid,customer_id`);
  assignedPlants = Array.isArray(webRows) ? webRows : [];

  // Rebuild soldUnassigned: fetch all sold with no customer_id
  const allSold = await dbGet('plant_web', '?web_status=eq.sold&select=rid,customer_id');
  const allSoldArr = Array.isArray(allSold) ? allSold : [];
  soldUnassigned = allSoldArr.filter(w => !w.customer_id);

  // Get plant names for assigned
  const allRids = assignedPlants.map(w => w.rid);
  let ridNameMap = {};
  if (allRids.length) {
    const rehabRows = await dbGet('rehab', `?rid=in.(${allRids.join(',')})&select=rid,plant_name`);
    if (Array.isArray(rehabRows)) rehabRows.forEach(r => { ridNameMap[r.rid] = r.plant_name; });
  }
  // Get names for unassigned dropdown
  const unassignedRids = soldUnassigned.map(w => w.rid);
  let unassignedNameMap = {};
  if (unassignedRids.length) {
    const rehabRows2 = await dbGet('rehab', `?rid=in.(${unassignedRids.join(',')})&select=rid,plant_name`);
    if (Array.isArray(rehabRows2)) rehabRows2.forEach(r => { unassignedNameMap[r.rid] = r.plant_name; });
  }

  renderAssignList(ridNameMap);
  renderAssignDropdown(unassignedNameMap);
}

function renderAssignList(ridNameMap) {
  const list = document.getElementById('assign-list');
  if (!assignedPlants.length) {
    list.innerHTML = '<div class="assign-empty">尚未分配植物</div>';
    return;
  }
  list.innerHTML = assignedPlants.map(w => `
    <div class="assign-item" id="aitem-${w.rid}">
      <span class="assign-item-rid">${w.rid}</span>
      <span class="assign-item-name">${escHtml(ridNameMap[w.rid] || w.rid)}</span>
      <a href="/plant.html?rid=${w.rid}" target="_blank" style="font-size:10px;color:var(--text3);text-decoration:none">查看</a>
      <button class="assign-remove-btn" onclick="removeAssignment('${w.rid}')" title="移除分配">✕</button>
    </div>`).join('');
}

function renderAssignDropdown(unassignedNameMap) {
  const sel = document.getElementById('assign-select');
  sel.innerHTML = '<option value="">— 選擇已售出未分配的植物 —</option>' +
    soldUnassigned.map(w =>
      `<option value="${w.rid}">${w.rid}${unassignedNameMap[w.rid] ? ' — ' + escHtml(unassignedNameMap[w.rid]) : ''}</option>`
    ).join('');
}

async function addAssignment() {
  const sel = document.getElementById('assign-select');
  const rid = sel.value;
  if (!rid || !selectedCustId) return;

  const r = await dbPatch('plant_web', `?rid=eq.${rid}`, { customer_id: selectedCustId });
  if (r.ok) {
    toast(`${rid} 已分配 ✓`);
    await selectCustomer(selectedCustId);
    // Refresh count in table
    await refreshCountMap();
  } else {
    toast('分配失敗');
  }
}

async function removeAssignment(rid) {
  if (!confirm(`移除 ${rid} 的客戶分配？`)) return;
  const r = await dbPatch('plant_web', `?rid=eq.${rid}`, { customer_id: null });
  if (r.ok) {
    toast(`${rid} 已移除分配 ✓`);
    await selectCustomer(selectedCustId);
    await refreshCountMap();
  } else {
    toast('移除失敗');
  }
}

async function refreshCountMap() {
  const plantWebRows = await dbGet('plant_web', '?web_status=eq.sold&select=rid,customer_id');
  const webRows = Array.isArray(plantWebRows) ? plantWebRows : [];
  const countMap = {};
  webRows.forEach(w => {
    if (w.customer_id) countMap[w.customer_id] = (countMap[w.customer_id] || 0) + 1;
  });
  renderCustomerTable(countMap);
}

function editCustomer(custId) {
  const cust = allCustomers.find(c => c.id === custId);
  if (!cust) return;
  document.getElementById('cust-edit-id').value = custId;
  document.getElementById('cust-name').value = cust.name || '';
  document.getElementById('cust-password').value = cust.password || '';
  document.getElementById('cust-notes').value = cust.notes || '';
  document.getElementById('cust-form-title').textContent = `編輯客戶：${cust.name}`;
  document.getElementById('cust-cancel-btn').style.display = 'inline-block';
  document.getElementById('cust-name').focus();
  // Scroll to form
  document.getElementById('cust-name').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function cancelEditCustomer() {
  document.getElementById('cust-edit-id').value = '';
  document.getElementById('cust-name').value = '';
  document.getElementById('cust-password').value = '';
  document.getElementById('cust-notes').value = '';
  document.getElementById('cust-form-title').textContent = '新增客戶 / Thêm khách hàng';
  document.getElementById('cust-cancel-btn').style.display = 'none';
}

async function saveCustomer() {
  const id = document.getElementById('cust-edit-id').value;
  const name = document.getElementById('cust-name').value.trim();
  const password = document.getElementById('cust-password').value.trim();
  const notes = document.getElementById('cust-notes').value.trim();
  if (!name) { toast('請填寫客戶姓名'); return; }

  const body = { name, password: password || null, notes: notes || null };
  let r;
  if (id) {
    r = await dbPatch('customers', `?id=eq.${id}`, body);
  } else {
    r = await dbPost('customers', body, 'return=minimal');
  }

  if (r.ok) {
    toast(id ? '客戶已更新 ✓' : '客戶已新增 ✓');
    cancelEditCustomer();
    custLoaded = false;
    await loadCustomers();
    if (selectedCustId) selectCustomer(selectedCustId);
  } else {
    toast('儲存失敗');
  }
}

async function deleteCustomer(custId) {
  const cust = allCustomers.find(c => c.id === custId);
  if (!cust) return;
  if (!confirm(`確定刪除客戶「${cust.name}」？\n（其植物分配將被清除）`)) return;

  // Unassign all plants first
  await dbPatch('plant_web', `?customer_id=eq.${custId}`, { customer_id: null });
  const r = await dbDelete('customers', `?id=eq.${custId}`);
  if (r.ok) {
    toast('客戶已刪除 ✓');
    if (selectedCustId === custId) {
      selectedCustId = null;
      document.getElementById('assign-panel').style.display = 'none';
    }
    custLoaded = false;
    await loadCustomers();
  } else {
    toast('刪除失敗');
  }
}
</script>
