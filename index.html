<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rễ , thân , lá studio — 根莖葉工作室</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF8F4;
  --cream2:#F0EBE1;
  --dark:#0D0D0A;
  --dark2:#1A1A14;
  --green:#2D4A2D;
  --gold:#9A7A1E;
  --text:#0D0D0A;
  --text2:#4A4A3A;
  --text3:#8A8A72;
  --border:#D8D2C4;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--cream);
  color:var(--text);
  font-family:'Cormorant Garamond',Georgia,serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── Nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:18px 28px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(250,248,244,0);
  transition:background .3s,border-color .3s;
}
nav.scrolled{
  background:rgba(250,248,244,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.nav-logo{
  font-size:13px;letter-spacing:.15em;
  color:var(--text2);font-style:italic;
  text-decoration:none;
}
.nav-admin{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;
  color:var(--text3);text-decoration:none;
  transition:color .2s;
}
.nav-admin:hover{color:var(--text)}

/* ── Hero ── */
.hero{
  flex:1;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:0 28px 52px;
  min-height:100svh;
  position:relative;
}
.hero-eyebrow{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.28em;
  color:var(--gold);
  margin-bottom:20px;
  text-transform:uppercase;
}
.hero-title{
  font-size:clamp(52px,14vw,120px);
  font-weight:300;font-style:italic;
  line-height:.95;
  letter-spacing:.02em;
  color:var(--dark);
  margin-bottom:12px;
}
.hero-title-zh{
  font-size:clamp(18px,4vw,28px);
  font-weight:300;
  color:var(--text3);
  letter-spacing:.18em;
  margin-bottom:40px;
}
.hero-rule{
  width:100%;
  height:1px;
  background:var(--border);
  margin-bottom:32px;
}

/* ── Nav Links ── */
.nav-entries{
  display:flex;flex-direction:column;gap:0;
}
.nav-entry{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:14px 0;
  border-bottom:1px solid var(--border);
  text-decoration:none;
  color:var(--text);
  transition:color .2s;
  cursor:pointer;
}
.nav-entry:first-child{border-top:1px solid var(--border)}
.nav-entry:hover .entry-name{color:var(--green)}
.nav-entry:hover .entry-arrow{transform:translateX(4px);opacity:1}
.entry-num{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.1em;
  color:var(--text3);
  flex-shrink:0;
  margin-right:16px;
}
.entry-name{
  font-size:clamp(20px,5vw,28px);
  font-style:italic;font-weight:300;
  flex:1;
  transition:color .2s;
}
.entry-sub{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.12em;
  color:var(--text3);
  margin-left:12px;
  display:none;
}
@media(min-width:480px){.entry-sub{display:block}}
.entry-arrow{
  font-size:16px;color:var(--text3);
  margin-left:12px;flex-shrink:0;
  transition:transform .25s,opacity .2s;
  opacity:.4;
}

/* ── Footer ── */
footer{
  padding:20px 28px;
  border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.footer-fb{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--text3);text-decoration:none;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.1em;
  transition:color .2s;
}
.footer-fb:hover{color:var(--text2)}
.footer-fb svg{width:14px;height:14px;fill:currentColor}
.footer-ver{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:.1em;
  color:var(--text3);opacity:.5;
}
</style>
</head>
<body>

<nav id="main-nav">
  <a class="nav-logo" href="/">rễ , thân , lá</a>
  <a class="nav-admin" href="/admin.html">後台</a>
</nav>

<div class="hero">
  <div class="hero-eyebrow">Platycerium specialist</div>
  <div class="hero-title">rễ ,<br>thân ,<br>lá</div>
  <div class="hero-title-zh">根莖葉工作室</div>
  <div class="hero-rule"></div>

  <nav class="nav-entries">
    <a class="nav-entry" href="/plants.html">
      <span class="entry-num">01</span>
      <span class="entry-name">植物展示</span>
      <span class="entry-sub">VƯỜN CÂY</span>
      <span class="entry-arrow">→</span>
    </a>
    <a class="nav-entry" href="/shop.html">
      <span class="entry-num">02</span>
      <span class="entry-name">其他商品</span>
      <span class="entry-sub">SẢN PHẨM</span>
      <span class="entry-arrow">→</span>
    </a>
    <a class="nav-entry" href="/collection.html">
      <span class="entry-num">03</span>
      <span class="entry-name">我的收藏</span>
      <span class="entry-sub">BỘ SƯU TẬP</span>
      <span class="entry-arrow">→</span>
    </a>
  </nav>
</div>

<footer>
  <a class="footer-fb" href="https://www.facebook.com/profile.php?id=61574898618832" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24"><path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.791-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.49 0-1.956.93-1.956 1.887v2.267h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/></svg>
    Facebook
  </a>
  <div class="footer-ver">v2.0</div>
</footer>

<script>
const nav = document.getElementById('main-nav');
window.addEventListener('scroll', () => {
  nav.classList.toggle('scrolled', window.scrollY > 20);
}, {passive:true});
</script>

</body>
</html>
